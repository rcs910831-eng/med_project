# Prometheus Alert Rules
# SHIELD PHARMA v21.0 모니터링 알림 규칙

groups:
  - name: pharma_application
    interval: 30s
    rules:
      # ====================================================================
      # 애플리케이션 헬스
      # ====================================================================

      - alert: PharmaAppDown
        expr: up{job="pharma-app"} == 0
        for: 2m
        labels:
          severity: critical
          service: pharma-app
        annotations:
          summary: "SHIELD PHARMA 애플리케이션 다운"
          description: "{{ $labels.instance }} - 2분 이상 응답 없음"
          dashboard: "https://grafana.example.com/d/pharma-app"

      - alert: PharmaHighCPU
        expr: |
          rate(container_cpu_usage_seconds_total{pod=~"pharma-hybrid.*"}[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
          service: pharma-app
        annotations:
          summary: "SHIELD PHARMA 높은 CPU 사용률"
          description: "{{ $labels.pod }} - CPU: {{ $value | humanizePercentage }}"

      - alert: PharmaHighMemory
        expr: |
          container_memory_usage_bytes{pod=~"pharma-hybrid.*"} /
          container_spec_memory_limit_bytes{pod=~"pharma-hybrid.*"} > 0.85
        for: 5m
        labels:
          severity: warning
          service: pharma-app
        annotations:
          summary: "SHIELD PHARMA 높은 메모리 사용률"
          description: "{{ $labels.pod }} - 메모리: {{ $value | humanizePercentage }}"

      - alert: PharmaHighLatency
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket{job="pharma-app"}[5m])
          ) > 5
        for: 5m
        labels:
          severity: warning
          service: pharma-app
        annotations:
          summary: "SHIELD PHARMA 높은 응답 시간"
          description: "P95 응답 시간: {{ $value | humanizeDuration }}"

      - alert: PharmaErrorRate
        expr: |
          rate(http_requests_total{job="pharma-app", status=~"5.."}[5m]) /
          rate(http_requests_total{job="pharma-app"}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          service: pharma-app
        annotations:
          summary: "SHIELD PHARMA 높은 에러율"
          description: "에러율: {{ $value | humanizePercentage }} (5% 초과)"

      # ====================================================================
      # 데이터베이스 헬스
      # ====================================================================

      - alert: PostgreSQLDown
        expr: up{job="postgresql"} == 0
        for: 2m
        labels:
          severity: critical
          service: database
        annotations:
          summary: "PostgreSQL 데이터베이스 다운"
          description: "{{ $labels.instance }} - 2분 이상 연결 불가"

      - alert: PostgreSQLConnections
        expr: |
          pg_stat_activity_count{job="postgresql"} > 200
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "PostgreSQL 연결 수 초과"
          description: "활성 연결: {{ $value }} (최대: 200)"

      - alert: PostgreSQLDiskUsage
        expr: |
          (pg_tablespace_disk_free / pg_tablespace_size) * 100 < 20
        for: 10m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "PostgreSQL 디스크 공간 부족"
          description: "사용 가능 공간: {{ $value | humanize }}%"

      - alert: PostgreSQLSlowQueries
        expr: |
          rate(pg_slow_queries_total[5m]) > 5
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "PostgreSQL 느린 쿼리 증가"
          description: "분당 느린 쿼리: {{ $value }}"

      # ====================================================================
      # 스토리지/볼륨
      # ====================================================================

      - alert: PersistentVolumeLow
        expr: |
          kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes < 0.1
        for: 10m
        labels:
          severity: warning
          service: storage
        annotations:
          summary: "영구 저장소 공간 부족"
          description: "{{ $labels.persistentvolumeclaim }} - 남은 공간: {{ $value | humanizePercentage }}"

      - alert: PersistentVolumeCritical
        expr: |
          kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes < 0.05
        for: 5m
        labels:
          severity: critical
          service: storage
        annotations:
          summary: "영구 저장소 임계값 도달"
          description: "{{ $labels.persistentvolumeclaim }} - 즉시 조치 필요"

      # ====================================================================
      # Kubernetes 클러스터
      # ====================================================================

      - alert: KubernetesPodCrashLooping
        expr: |
          rate(kube_pod_container_status_restarts_total[15m]) > 0.1
        for: 5m
        labels:
          severity: critical
          service: kubernetes
        annotations:
          summary: "Kubernetes 포드 반복 충돌"
          description: "{{ $labels.namespace }}/{{ $labels.pod }} - {{ $value | humanize }} 재시작/분"

      - alert: KubernetesMemoryPressure
        expr: |
          kube_node_status_condition{condition="MemoryPressure", status="true"} == 1
        for: 5m
        labels:
          severity: warning
          service: kubernetes
        annotations:
          summary: "Kubernetes 노드 메모리 압박"
          description: "{{ $labels.node }} - 메모리 부족"

      - alert: KubernetesDiskPressure
        expr: |
          kube_node_status_condition{condition="DiskPressure", status="true"} == 1
        for: 5m
        labels:
          severity: warning
          service: kubernetes
        annotations:
          summary: "Kubernetes 노드 디스크 압박"
          description: "{{ $labels.node }} - 디스크 공간 부족"

      - alert: KubernetesNodeNotReady
        expr: |
          kube_node_status_condition{condition="Ready", status="true"} == 0
        for: 5m
        labels:
          severity: critical
          service: kubernetes
        annotations:
          summary: "Kubernetes 노드 준비 안됨"
          description: "{{ $labels.node }} - 클러스터에서 분리됨"

      # ====================================================================
      # 의료 데이터 처리
      # ====================================================================

      - alert: PrescriptionProcessingError
        expr: |
          rate(pharma_prescription_errors_total[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
          service: pharma-app
        annotations:
          summary: "처방전 처리 오류 증가"
          description: "오류율: {{ $value | humanizePercentage }}"

      - alert: DrugDatabaseUnavailable
        expr: |
          up{job="pharma-app", component="drug-database"} == 0
        for: 2m
        labels:
          severity: critical
          service: pharma-app
        annotations:
          summary: "의약품 데이터베이스 사용 불가"
          description: "의약품 조회 기능이 작동하지 않음"

      - alert: APIQuotaExceeded
        expr: |
          pharma_api_quota_remaining < 100
        for: 5m
        labels:
          severity: warning
          service: pharma-app
        annotations:
          summary: "API 할당량 거의 소진"
          description: "남은 API 호출: {{ $value }}"

  # ====================================================================
  # 모니터링 시스템 헬스
  # ====================================================================
  - name: monitoring_system
    interval: 30s
    rules:
      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 1m
        labels:
          severity: critical
          service: monitoring
        annotations:
          summary: "Prometheus 모니터링 시스템 다운"
          description: "메트릭 수집이 중단됨"

      - alert: PrometheusHighScrapeFailureRate
        expr: |
          rate(prometheus_sd_consul_rpc_duration_seconds_count{call="rpc"}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: monitoring
        annotations:
          summary: "Prometheus 스크레이프 실패 증가"
          description: "실패율: {{ $value | humanizePercentage }}"

      - alert: GrafanaDown
        expr: up{job="grafana"} == 0
        for: 1m
        labels:
          severity: warning
          service: monitoring
        annotations:
          summary: "Grafana 대시보드 시스템 다운"
          description: "모니터링 시각화 사용 불가"
