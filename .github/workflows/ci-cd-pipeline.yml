name: SHIELD PHARMA CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'agents/**'
      - 'utils/**'
      - 'modules/**'
      - '*.py'
      - 'requirements*.txt'
      - 'Dockerfile_backend'
      - 'docker-compose.yml'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 0 * * *'

jobs:
  # ────────────────────────────────────────────────
  # 1단계: 코드 품질 검사
  # ────────────────────────────────────────────────
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Flake8 — syntax & fatal errors only
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=temp_zip,__pycache__,.git
        continue-on-error: true

      - name: Black — format check
        run: black --check . --exclude="(temp_zip|__pycache__|\.git|\.venv)"
        continue-on-error: true

  # ────────────────────────────────────────────────
  # 2단계: 보안 스캔
  # ────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Trivy — filesystem vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ────────────────────────────────────────────────
  # 3단계: Docker 이미지 빌드 (main 브랜치만)
  # ────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile_backend
          push: true
          tags: ghcr.io/${{ github.repository }}/pharma-hybrid:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────
  # 4단계: Render 배포 상태 확인
  # ────────────────────────────────────────────────
  verify-render:
    name: Verify Render Deployment
    runs-on: ubuntu-latest
    needs: [lint, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy
        run: |
          if [ -n "${{ secrets.RENDER_API_KEY }}" ] && [ -n "${{ secrets.RENDER_SERVICE_ID }}" ]; then
            curl -s -X POST \
              "https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}" \
              -o /dev/null
            echo "Render deploy triggered"
          else
            echo "RENDER secrets not configured — skipping"
          fi

      - name: Wait and check Render health
        run: |
          sleep 30
          if [ -n "${{ secrets.RENDER_HEALTH_URL }}" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_HEALTH_URL }}/health" || echo "000")
            echo "Health check status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Deployment is healthy"
            else
              echo "Health check returned $STATUS (may still be starting)"
            fi
          else
            echo "RENDER_HEALTH_URL not set — skipping health check"
          fi
