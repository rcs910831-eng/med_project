# Kubernetes Secrets - Sensitive Data
# 민감한 정보 (API 키, 비밀번호 등)를 Kubernetes Secrets로 관리
# 주의: 프로덕션에서는 AWS Secrets Manager, HashiCorp Vault 등을 사용하세요

apiVersion: v1
kind: Secret
metadata:
  name: pharma-secrets
  namespace: shield-pharma
  labels:
    app: pharma-hybrid
    version: v21.0
type: Opaque
stringData:
  # API 키 (base64로 인코딩됨)
  anthropic-api-key: "${ANTHROPIC_API_KEY}"
  google-api-key: "${GOOGLE_API_KEY}"
  google-cloud-project: "${GOOGLE_CLOUD_PROJECT}"

  # 데이터베이스 자격증명
  database-username: "pharma_user"
  database-password: "${DB_PASSWORD}"

  # 모니터링 자격증명
  grafana-admin-password: "${GRAFANA_PASSWORD}"
  pgadmin-password: "${PGADMIN_PASSWORD}"

  # JWT 시크릿 (API 인증용)
  jwt-secret-key: "${JWT_SECRET_KEY}"

---
# Docker Registry Credentials (프라이빗 이미지 저장소 접근)
apiVersion: v1
kind: Secret
metadata:
  name: pharma-docker-credentials
  namespace: shield-pharma
type: kubernetes.io/dockercfg
data:
  .dockercfg: |
    {
      "docker.io": {
        "auth": "${DOCKER_REGISTRY_AUTH}",
        "email": "registry@shieldpharma.com"
      }
    }
