# Kubernetes PersistentVolumeClaims - Data Storage
# 약자: PVC (영구적인 데이터 저장)

---
# 환자 이력 저장소
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pharma-patients-pvc
  namespace: shield-pharma
  labels:
    app: pharma-hybrid
    purpose: patient-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
# 약가 데이터 저장소
